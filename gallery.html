    <script>
        function toggleLike(button) {
            const countElement = button.querySelector('.like-count');
            let currentCount = parseInt(countElement.textContent);
            if (button.classList.contains('bg-rose-500')) {
                button.classList.remove('bg-rose-500', 'text-white', 'border-rose-500');
                button.classList.add('bg-[#fff0f2]', 'border-[#ffd1d7]', 'text-[#ff4b6b]');
                countElement.textContent = currentCount - 1;
            } else {
                button.classList.remove('bg-[#fff0f2]', 'border-[#ffd1d7]', 'text-[#ff4b6b]');
                button.classList.add('bg-rose-500', 'text-white', 'border-rose-500');
                countElement.textContent = currentCount + 1;
            }
        }
    </script>
