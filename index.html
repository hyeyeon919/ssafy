<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>I AM - 우리집 주인공 다롱이 🐾</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css');
        body { font-family: 'Pretendard', sans-serif; }
    </style>
</head>
<body class="bg-[#fcf9f5] text-[#333333] min-h-screen flex flex-col items-center pt-24 pb-12 px-4">

    <nav class="fixed top-0 left-0 right-0 bg-white/80 backdrop-blur-md border-b border-[#f0e6dc] z-50 shadow-sm">
        <div class="max-w-5xl mx-auto px-6 h-16 flex items-center justify-between">
            <a href="index.html" class="text-lg font-bold text-[#8a6d4b] flex items-center gap-2">
                <span>🐾 I AM DARONG</span>
            </a>
            <div class="flex gap-6 text-sm font-semibold">
                <a href="index.html" class="text-[#8a6d4b] border-b-2 border-[#8a6d4b] pb-1 px-1 transition-colors">홈/소개</a>
                <a href="gallery.html" class="text-[#777777] hover:text-[#8a6d4b] pb-1 px-1 transition-colors">갤러리</a>
                <a href="guestbook.html" class="text-[#777777] hover:text-[#8a6d4b] pb-1 px-1 transition-colors">방명록</a>
            </div>
        </div>
    </nav>

    <div class="bg-white rounded-3xl shadow-xl border border-[#f0e6dc] w-full max-w-[450px] overflow-hidden text-center mb-12 transition-all duration-300 hover:shadow-2xl">
        <div class="bg-gradient-to-br from-[#e6cca7] to-[#cbb28a] h-[100px] relative"></div>
        <div class="relative -mt-[60px] mb-4 flex justify-center">
            <img class="w-[140px] h-[140px] rounded-full border-4 border-white object-cover shadow-md bg-gray-100" 
                 src="A3E8D04A-B2A6-43E5-8D4D-330F93A19602.jpg" alt="다롱이 대표 사진">
        </div>
        <div class="px-8 pb-8">
            <span class="inline-block bg-[#f3ede4] text-[#8a6d4b] px-3 py-1 rounded-xl text-xs font-semibold mb-3">개인 프로젝트 : I AM (MPA)</span>
            <h1 class="text-3xl font-bold text-[#2c2c2c] mb-1.5">다롱이</h1>
            <p class="text-sm text-[#777777] mb-5">올해로 멋진 10살 🐾</p>
            <p class="text-sm leading-relaxed text-[#555555] mb-7 break-keep">
                안녕하세요! 우리 집의 영원한 주인공이자 행복 비타민, 다롱이를 소개합니다. 
                하얗고 몽실몽실한 털과 까만 코가 매력적인 최고의 파트너예요! 상단 메뉴를 클릭해 갤러리와 방명록도 구경해 보세요!
            </p>
            <button id="btnInteract" class="bg-[#8a6d4b] hover:bg-[#72593c] text-white py-3.5 px-7 text-sm font-semibold rounded-full w-full cursor-pointer transition-all active:scale-[0.98]">
                다롱이에게 인사하기 👋
            </button>
        </div>
    </div>

    <div id="modalOverlay" class="fixed inset-0 bg-black/50 flex justify-center items-center opacity-0 invisible transition-all duration-300 z-50 p-5">
        <div class="bg-white p-8 rounded-2xl max-w-[360px] w-full text-center scale-75 transition-all duration-300 id-modal-content">
            <h3 class="text-xl font-bold mb-3 text-[#2c2c2c]">멍멍! 반가워요! 🐶</h3>
            <p class="text-sm text-[#666666] leading-relaxed mb-6">다롱이가 꼬리를 흔들며 인사를 건넸습니다!<br>방문해 주셔서 감사해요!</p>
            <button id="btnClose" class="bg-[#f3ede4] hover:bg-[#ebdcc9] text-[#8a6d4b] py-2.5 px-6 text-sm font-semibold rounded-lg w-full cursor-pointer">닫기</button>
        </div>
    </div>

    <footer class="text-center text-[#aaaaaa] text-sm mt-auto">
        <p>다롱이와 함께하는 행복한 매일 🐾</p>
    </footer>

    <script>
        const btnInteract = document.getElementById('btnInteract');
        const modalOverlay = document.getElementById('modalOverlay');
        const btnClose = document.getElementById('btnClose');
        const modalContent = document.querySelector('.id-modal-content');

        btnInteract.addEventListener('click', () => {
            modalOverlay.classList.remove('invisible', 'opacity-0');
            setTimeout(() => { modalContent.classList.remove('scale-75'); }, 10);
        });
        const closeModal = () => {
            modalContent.classList.add('scale-75');
            setTimeout(() => { modalOverlay.classList.add('invisible', 'opacity-0'); }, 150);
        };
        btnClose.addEventListener('click', closeModal);
        modalOverlay.addEventListener('click', (e) => { if (e.target === modalOverlay) closeModal(); });
    </script>
</body>
</html>
