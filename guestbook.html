<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>I AM - 다롱이 방명록 💌</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css');
        body { font-family: 'Pretendard', sans-serif; }
    </style>
</head>
<body class="bg-[#fcf9f5] text-[#333333] min-h-screen flex flex-col items-center pt-24 pb-12 px-4">

    <nav class="fixed top-0 left-0 right-0 bg-white/80 backdrop-blur-md border-b border-[#f0e6dc] z-50 shadow-sm">
        <div class="max-w-5xl mx-auto px-6 h-16 flex items-center justify-between">
            <a href="index.html" class="text-lg font-bold text-[#8a6d4b] flex items-center gap-2">
                <span>🐾 I AM DARONG</span>
            </a>
            <div class="flex gap-6 text-sm font-semibold">
                <a href="index.html" class="text-[#777777] hover:text-[#8a6d4b] pb-1 px-1 transition-colors">홈/소개</a>
                <a href="gallery.html" class="text-[#777777] hover:text-[#8a6d4b] pb-1 px-1 transition-colors">갤러리</a>
                <a href="guestbook.html" class="text-[#8a6d4b] border-b-2 border-[#8a6d4b] pb-1 px-1 transition-colors">방명록</a>
            </div>
        </div>
    </nav>

    <div class="w-full max-w-2xl bg-white p-6 rounded-2xl shadow-md border border-[#f5ede4] mb-12">
        <h3 class="text-xl font-bold text-[#8a6d4b] mb-2 flex items-center gap-2">💌 다롱이에게 한마디</h3>
        <p class="text-xs text-gray-400 mb-6">다롱이에게 전하고 싶은 따뜻한 응원의 메시지를 남겨주세요!</p>
        
        <form id="guestbookForm" class="flex flex-col gap-3 mb-6">
            <div class="flex gap-3">
                <input type="text" id="visitorName" placeholder="닉네임" required class="border border-[#f0e6dc] rounded-xl px-4 py-2 text-sm w-1/3 focus:outline-none focus:border-[#8a6d4b] bg-[#fcf9f5]">
                <input type="text" id="visitorMessage" placeholder="메시지를 적어주세요!" required class="border border-[#f0e6dc] rounded-xl px-4 py-2 text-sm flex-1 focus:outline-none focus:border-[#8a6d4b] bg-[#fcf9f5]">
            </div>
            <button type="submit" class="bg-[#8a6d4b] hover:bg-[#72593c] text-white font-semibold py-2.5 rounded-xl text-sm transition-colors cursor-pointer">등록하기</button>
        </form>

        <div id="guestbookList" class="flex flex-col gap-3 max-h-[400px] overflow-y-auto pr-1">
            </div>
    </div>

    <script>
        const guestbookForm = document.getElementById('guestbookForm');
        const guestbookList = document.getElementById('guestbookList');

        function loadComments() {
            guestbookList.innerHTML = '';
            const comments = JSON.parse(localStorage.getItem('darong_comments') || '[]');
            if(comments.length === 0) {
                guestbookList.innerHTML = `<p class="text-sm text-gray-400 text-center py-8">첫 한마디를 남겨보세요! 🐾</p>`;
                return;
            }
            comments.forEach((item, index) => {
                const commentBox = document.createElement('div');
                commentBox.className = "bg-[#fcf9f5] border border-[#f0e6dc] p-3 rounded-xl text-sm flex justify-between items-start";
                commentBox.innerHTML = `
                    <div class="flex-1">
                        <span class="font-bold text-[#8a6d4b] mr-2">${escapeHtml(item.name)}</span>
                        <p class="text-gray-600 inline">${escapeHtml(item.message)}</p>
                    </div>
                    <button onclick="deleteComment(${index})" class="text-gray-300 hover:text-rose-500 ml-2 text-xs transition-colors cursor-pointer">삭제</button>
                `;
                guestbookList.appendChild(commentBox);
            });
        }

        function escapeHtml(str) {
            return str.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;").replace(/'/g, "&#039;");
        }

        guestbookForm.addEventListener('submit', (e) => {
            e.preventDefault();
            const nameInput = document.getElementById('visitorName');
            const messageInput = document.getElementById('visitorMessage');
            
            const comments = JSON.parse(localStorage.getItem('darong_comments') || '[]');
            comments.unshift({ name: nameInput.value, message: messageInput.value });
            localStorage.setItem('darong_comments', JSON.stringify(comments));
            
            nameInput.value = '';
            messageInput.value = '';
            loadComments();
        });

        function deleteComment(index) {
            const comments = JSON.parse(localStorage.getItem('darong_comments') || '[]');
            comments.splice(index, 1);
            localStorage.setItem('darong_comments', JSON.stringify(comments));
            loadComments();
        }

        loadComments();
    </script>
</body>
</html>
